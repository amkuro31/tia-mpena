<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Birthday Ultra Party 🎂</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background: linear-gradient(to top, #ffd1dc, #ff85a2);
  font-family:'Segoe UI', sans-serif;
}

#ui {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

input, button {
  padding:10px;
  border-radius:20px;
  border:none;
  margin:5px;
}

button {
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

#timer {
  margin-top:10px;
}
</style>
</head>

<body>

<div id="ui">
  <h2>🎀 Birthday Ultra 🎀</h2>
  <input id="name" placeholder="Nama">
  <input id="age" type="number" placeholder="Umur">
  <button onclick="start()">Mulai</button>
  <div id="timer"></div>
</div>

<audio id="music">
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://threejs.org/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer;
let candles=[], flameParticles=[];
let gameActive=false, timeLeft=10;

// START
function start(){
  document.getElementById("ui").style.display="none";
  document.getElementById("music").play();

  init();
  createCake();
  loadAvatar();
  setupMic();

  gameActive=true;
  countdown();
}

// SCENE
function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  camera.position.z=6;

  let light=new THREE.PointLight(0xffc0cb,2);
  light.position.set(3,5,3);
  scene.add(light);

  let ambient=new THREE.AmbientLight(0xffffff,0.5);
  scene.add(ambient);

  animate();
}

// ANIMATE
function animate(){
  requestAnimationFrame(animate);
  scene.rotation.y += 0.002;

  flameParticles.forEach(p=>{
    p.position.y += 0.01;
    p.material.opacity -= 0.01;
    if(p.material.opacity <= 0){
      p.position.y = 0;
      p.material.opacity = 1;
    }
  });

  renderer.render(scene,camera);
}

// 🎂 CAKE
function createCake(){
  let cake = new THREE.Mesh(
    new THREE.CylinderGeometry(2,2,1,64),
    new THREE.MeshStandardMaterial({color:0x4b2e1e})
  );
  scene.add(cake);

  let age = parseInt(document.getElementById("age").value)||5;

  for(let i=0;i<age;i++){
    let candle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05,0.05,0.5),
      new THREE.MeshStandardMaterial({color:0xffffff})
    );

    candle.position.set(
      Math.cos(i*2*Math.PI/age)*1.3,
      0.9,
      Math.sin(i*2*Math.PI/age)*1.3
    );

    scene.add(candle);
    candles.push(candle);

    createFlame(candle);
  }
}

// 🔥 PARTICLE FIRE
function createFlame(candle){
  for(let i=0;i<10;i++){
    let p = new THREE.Mesh(
      new THREE.SphereGeometry(0.03),
      new THREE.MeshBasicMaterial({
        color:0xffaa00,
        transparent:true,
        opacity:1
      })
    );

    p.position.y=0.3;
    candle.add(p);
    flameParticles.push(p);
  }

  let glow=new THREE.PointLight(0xffaa00,1,2);
  glow.position.y=0.3;
  candle.add(glow);
}

// 💨 SMOKE
function createSmoke(x,y,z){
  for(let i=0;i<20;i++){
    let s=new THREE.Mesh(
      new THREE.SphereGeometry(0.05),
      new THREE.MeshBasicMaterial({
        color:0xaaaaaa,
        transparent:true,
        opacity:0.5
      })
    );

    s.position.set(x,y,z);
    scene.add(s);

    let speed=Math.random()*0.02;

    function anim(){
      s.position.y+=speed;
      s.material.opacity-=0.01;
      if(s.material.opacity>0) requestAnimationFrame(anim);
      else scene.remove(s);
    }
    anim();
  }
}

// 👤 AVATAR
function loadAvatar(){
  let loader=new THREE.GLTFLoader();
  loader.load(
    "https://modelviewer.dev/shared-assets/models/RobotExpressive.glb",
    g=>{
      let avatar=g.scene;
      avatar.scale.set(1.5,1.5,1.5);
      avatar.position.set(0,-1,-2);
      scene.add(avatar);
    }
  );
}

// 🎤 MIC
function setupMic(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let ctx=new AudioContext();
    let mic=ctx.createMediaStreamSource(stream);
    let analyser=ctx.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize=256;

    let data=new Uint8Array(analyser.frequencyBinCount);

    function detect(){
      analyser.getByteFrequencyData(data);
      let volume=data.reduce((a,b)=>a+b)/data.length;

      if(volume>65 && gameActive) blow();
      requestAnimationFrame(detect);
    }
    detect();
  });
}

// 🎂 TIUP
function blow(){
  candles.forEach(c=>{
    createSmoke(c.position.x,c.position.y,c.position.z);
    scene.remove(c);
  });

  flameParticles=[];
  gameActive=false;

  startParty();
}

// ⏳ TIMER
function countdown(){
  let t=document.getElementById("timer");

  let interval=setInterval(()=>{
    timeLeft--;
    t.innerText="⏳ "+timeLeft+" detik";

    if(timeLeft<=0){
      clearInterval(interval);
      if(gameActive) alert("😢 Gagal!");
    }
  },1000);
}

// 🎉 PARTY MODE
function startParty(){
  showText();
  confetti();
  fireworks();
  flash();
}

// 📝 TEXT
function showText(){
  let name=document.getElementById("name").value||"KAMU";
  let d=document.createElement("div");
  d.innerHTML="🎉 HAPPY BIRTHDAY "+name+" 🎉";
  d.style.position="absolute";
  d.style.top="40%";
  d.style.width="100%";
  d.style.textAlign="center";
  d.style.fontSize="40px";
  d.style.color="white";
  document.body.appendChild(d);
}

// 🎆 CONFETTI
function confetti(){
  for(let i=0;i<150;i++){
    let c=document.createElement("div");
    c.style.position="absolute";
    c.style.width="8px";
    c.style.height="8px";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.style.left=Math.random()*innerWidth+"px";
    c.style.top="-10px";
    c.style.animation="fall 3s linear infinite";
    document.body.appendChild(c);
  }
}

// 🎇 FIREWORK
function fireworks(){
  for(let i=0;i<5;i++){
    setTimeout(()=>explode(),i*500);
  }
}

function explode(){
  let x=Math.random()*innerWidth;
  let y=Math.random()*innerHeight/2;

  for(let i=0;i<30;i++){
    let f=document.createElement("div");
    f.style.position="absolute";
    f.style.width="5px";
    f.style.height="5px";
    f.style.background=`hsl(${Math.random()*360},100%,50%)`;
    f.style.left=x+"px";
    f.style.top=y+"px";

    let a=Math.random()*Math.PI*2;
    let d=Math.random()*100;

    f.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`,opacity:0}
    ],{duration:1000});

    document.body.appendChild(f);
  }
}

// 💡 FLASH
function flash(){
  let f=document.createElement("div");
  f.style.position="absolute";
  f.style.width="100%";
  f.style.height="100%";
  f.style.background="white";
  f.style.opacity="0.8";
  document.body.appendChild(f);

  setTimeout(()=>f.remove(),200);
}

// CSS tambahan
let style=document.createElement("style");
style.innerHTML="@keyframes fall{to{transform:translateY(100vh) rotate(360deg)}}";
document.head.appendChild(style);
</script>

</body>
</html>
